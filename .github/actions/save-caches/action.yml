name: "Save Caches"
description: "Save ccache and cleanup old caches"

inputs:
  ccache-key:
    required: true
  ccache-prefix:
    required: true

runs:
  using: composite
  steps:
    - name: "💾 Save ccache"
      uses: actions/cache/save@v5
      with:
        path: ${{ github.workspace }}/.ccache
        key: ${{ inputs.ccache-key }}

    - name: "🧹 Cleanup old caches"
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        CURRENT="${{ inputs.ccache-key }}"
        PREFIX="${{ inputs.ccache-prefix }}"
        CACHES=$(gh api \
          "/repos/${{ github.repository }}/actions/caches?per_page=100" \
          --jq ".actions_caches[] | select(.key | startswith(\"${PREFIX}\")) | select(.key != \"${CURRENT}\") | .id")
        if [ -n "$CACHES" ]; then
          for ID in $CACHES; do
            gh api --method DELETE "/repos/${{ github.repository }}/actions/caches/${ID}" || true
          done
        fi
