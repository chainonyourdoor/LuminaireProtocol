name: "🔥 Cache Warming"

on:
  workflow_dispatch:
    inputs:
      UPDATE_ARSENAL:
        description: "Refresh Arsenal"
        type: choice
        default: "yes"
        options:
          - "yes"
          - "no"
      ENABLE_LTO:
        description: "⚠️ Enable LTO"
        type: choice
        default: "NONE"
        options:
          - "NONE"
          - "THIN"

env:
  DEBIAN_FRONTEND: noninteractive
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: "5G"

jobs:

  # ======================================================
  # 📦 PREP
  # ======================================================
  prep:
    name: "📦 Prep Arsenal"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PERSONAL_TOKEN:   ${{ secrets.PERSONAL_TOKEN }}
      PREP_MODE:        "true"
      USE_CLANG_CACHE:  ${{ inputs.UPDATE_ARSENAL != 'yes' }}
      USE_KERNEL_CACHE: ${{ inputs.UPDATE_ARSENAL != 'yes' }}
      USE_AK3_CACHE:    ${{ inputs.UPDATE_ARSENAL != 'yes' }}

    steps:
      - name: "🌀 Clone LuminaireProtocol"
        run: |
          git clone --filter=blob:none \
            "https://x-access-token:${PERSONAL_TOKEN}@github.com/chainonyourdoor/LuminaireProtocol" \
            .

      - name: "♻️ Restore arsenal cache"
        if: inputs.UPDATE_ARSENAL != 'yes'
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/clang-cache
            ~/ccache-bin
            ~/ak3-cache
            ~/kernel-cache
            ~/.apt-cache
          key: arsenal-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: arsenal-${{ github.ref_name }}-

      - name: "📦 Run Prep"
        run: bash build.sh

      - name: "💾 Save arsenal cache"
        if: always()
        uses: actions/cache/save@v5
        with:
          path: |
            ~/clang-cache
            ~/ccache-bin
            ~/ak3-cache
            ~/kernel-cache
            ~/.apt-cache
          key: arsenal-${{ github.ref_name }}-${{ github.run_id }}

      - name: "🧹 Cleanup old arsenal caches"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          CACHES=$(gh api \
            "/repos/${{ github.repository }}/actions/caches?per_page=100" \
            --jq ".actions_caches[] | select(.key | startswith(\"arsenal-${{ github.ref_name }}-\")) | select(.key != \"arsenal-${{ github.ref_name }}-${{ github.run_id }}\") | .id")
          if [ -n "$CACHES" ]; then
            for ID in $CACHES; do
              gh api --method DELETE "/repos/${{ github.repository }}/actions/caches/${ID}" || true
            done
          fi

  # ======================================================
  # 🔥 WARM
  # ======================================================
  warm:
    name: "🔥 Warm Cache"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: prep

    env:
      PERSONAL_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
      WARMING_MODE:   "true"
      CCACHE_DIR:     ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: "5G"
      ENABLE_LTO:     ${{ inputs.ENABLE_LTO }}

    steps:
      - name: "🌀 Clone LuminaireProtocol"
        run: |
          git clone --filter=blob:none \
            "https://x-access-token:${PERSONAL_TOKEN}@github.com/chainonyourdoor/LuminaireProtocol" \
            .

      - name: "🧰 Setup Swap Space"
        uses: thejerrybao/setup-swap-space@v1
        with:
          swap-size-gb: 12

      - name: "♻️ Restore arsenal cache"
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/clang-cache
            ~/ccache-bin
            ~/ak3-cache
            ~/kernel-cache
            ~/.apt-cache
          key: arsenal-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: arsenal-${{ github.ref_name }}-

      - name: "♻️ Restore ccache data"
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-data-${{ inputs.ENABLE_LTO == 'THIN' && 'lto-' || '' }}${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: ccache-data-${{ inputs.ENABLE_LTO == 'THIN' && 'lto-' || '' }}${{ github.ref_name }}-

      - name: "🔥 Warm"
        env:
          USE_CLANG_CACHE:            "true"
          USE_KERNEL_CACHE:           "true"
          USE_AK3_CACHE:              "true"
          CCACHE_IS_KERNEL_COMPILING: "true"
        run: bash build.sh

      - name: "📊 Ccache stats"
        id: stats
        if: always()
        run: |
          MISSES=0
          if [ -f "$HOME/ccache-bin/ccache" ]; then
            $HOME/ccache-bin/ccache --show-stats
            MISSES=$($HOME/ccache-bin/ccache --show-stats \
              | grep "Misses:" | awk '{sum+=$2} END{print sum+0}')
          fi
          echo "misses=${MISSES}" >> $GITHUB_OUTPUT

      - name: "💾 Save ccache data"
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-data-${{ inputs.ENABLE_LTO == 'THIN' && 'lto-' || '' }}${{ github.ref_name }}-${{ github.run_id }}

      - name: "🔁 Re-trigger if not fully warmed"
        if: steps.stats.outputs.misses != '0'
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          gh workflow run warming.yml \
            --ref ${{ github.ref_name }} \
            --field UPDATE_ARSENAL=no \
            --field ENABLE_LTO=${{ inputs.ENABLE_LTO }}

      - name: "📣 Notify Telegram"
        if: steps.stats.outputs.misses == '0'
        run: |
          LTO_LABEL="None"
          [ "${{ inputs.ENABLE_LTO }}" = "THIN" ] && LTO_LABEL="Thin"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            ${TELEGRAM_THREAD_ID_LOG:+-d message_thread_id="${TELEGRAM_THREAD_ID_LOG}"} \
            -d text="🔥 Cache Fully Warmed%0A%0ALTO: ${LTO_LABEL}%0AHit rate: 100%" \
            -d parse_mode="HTML" || true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID_LOG: ${{ secrets.TELEGRAM_THREAD_ID_LOG }}

      - name: "🧹 Cleanup old ccache"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          LTO_PREFIX="${{ inputs.ENABLE_LTO == 'THIN' && 'lto-' || '' }}"
          CURRENT="ccache-data-${LTO_PREFIX}${{ github.ref_name }}-${{ github.run_id }}"
          CACHES=$(gh api \
            "/repos/${{ github.repository }}/actions/caches?per_page=100" \
            --jq ".actions_caches[] | select(.key | startswith(\"ccache-data-${LTO_PREFIX}${{ github.ref_name }}-\")) | select(.key != \"${CURRENT}\") | .id")
          if [ -n "$CACHES" ]; then
            for ID in $CACHES; do
              gh api --method DELETE "/repos/${{ github.repository }}/actions/caches/${ID}" || true
            done
          fi
