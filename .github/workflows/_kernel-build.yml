name: "Kernel Build"

on:
  workflow_call:
    inputs:
      build_system:
        type: string
        default: "MAKE"
      vanilla:
        type: boolean
        default: true
      resukisu:
        type: boolean
        default: false
      sukisu:
        type: boolean
        default: false
      susfs:
        type: boolean
        default: true
      kernel_version:
        type: string
        default: "6.1"
      update_arsenal:
        type: string
        default: "no"
      enable_lto:
        type: string
        default: "NONE"
      warming_mode:
        type: string
        default: "false"
      addons:
        type: string
        default: ""
    secrets:
      PERSONAL_TOKEN:
        required: true
      TELEGRAM_BOT_TOKEN:
        required: false
      TELEGRAM_CHAT_ID:
        required: false
      TELEGRAM_THREAD_ID_ARTIFACT:
        required: false
      TELEGRAM_THREAD_ID_LOG:
        required: false

env:
  DEBIAN_FRONTEND: noninteractive

jobs:

  # ======================================================
  # PREPARE MATRIX + ARSENAL
  # ======================================================
  prepare-matrix:
    name: "Prepare Arsenal"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      addons: ${{ steps.set.outputs.addons }}

    env:
      PERSONAL_TOKEN:  ${{ secrets.PERSONAL_TOKEN }}
      USE_KERNEL_CACHE: ${{ inputs.update_arsenal != 'yes' }}
      USE_AK3_CACHE:    ${{ inputs.update_arsenal != 'yes' }}
      KERNEL_VERSION:   ${{ inputs.kernel_version }}
      BUILD_SYSTEM:     ${{ inputs.build_system }}
      # MAKE only — KLEAF uses Bazel cache
      CCACHE_DIR:       ${{ inputs.build_system == 'MAKE' && format('{0}/.ccache', github.workspace) || '' }}
      CCACHE_MAXSIZE:   ${{ inputs.build_system == 'MAKE' && '5G' || '' }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6

      - name: "Free Disk Space"
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: "Build Variant Matrix"
        id: set
        run: |
          variants=()
          ${{ inputs.vanilla }}  && variants+=('{"root_solution":"VANILLA","susfs":false}')
          ${{ inputs.resukisu }} && variants+=('{"root_solution":"RESUKISU","susfs":${{ inputs.susfs }}}')
          ${{ inputs.sukisu }}   && variants+=('{"root_solution":"SUKISU","susfs":${{ inputs.susfs }}}')

          if [ ${#variants[@]} -eq 0 ]; then
            echo "No root solutions selected!"
            exit 1
          fi

          matrix_json=$(printf '%s\n' "${variants[@]}" | jq -cs '{include: .}')
          echo "matrix=${matrix_json}" >> $GITHUB_OUTPUT

          # Build addons string without leading comma
          addons=""
          ${{ inputs.bbg }}         && addons="${addons:+$addons,}bbg"         || true
          ${{ inputs.droidspaces }} && addons="${addons:+$addons,}droidspaces" || true
          ${{ inputs.nomount }}     && addons="${addons:+$addons,}nomount"     || true
          echo "addons=${addons}" >> $GITHUB_OUTPUT

      - name: "Restore Arsenal Cache"
        if: inputs.update_arsenal != 'yes'
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/clang-cache
            ~/ccache-bin
            ~/ak3-cache
            ~/kernel-cache
            ~/.apt-cache
          key: arsenal-${{ inputs.build_system }}-${{ inputs.kernel_version }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: arsenal-${{ inputs.build_system }}-${{ inputs.kernel_version }}-${{ github.ref_name }}-

      - name: "Prepare Arsenal"
        run: bash arsenal.sh

      - name: "Save Arsenal Cache"
        if: always()
        uses: actions/cache/save@v5
        with:
          path: |
            ~/clang-cache
            ~/ccache-bin
            ~/ak3-cache
            ~/kernel-cache
            ~/.apt-cache
          key: arsenal-${{ inputs.build_system }}-${{ inputs.kernel_version }}-${{ github.ref_name }}-${{ github.run_id }}

      - name: "Cleanup Old Arsenal"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          CACHES=$(gh api \
            "/repos/${{ github.repository }}/actions/caches?per_page=100" \
            --jq ".actions_caches[] | select(.key | startswith(\"arsenal-${{ inputs.build_system }}-${{ inputs.kernel_version }}-${{ github.ref_name }}-\")) | select(.key != \"arsenal-${{ inputs.build_system }}-${{ inputs.kernel_version }}-${{ github.ref_name }}-${{ github.run_id }}\") | .id")
          
          if [ -z "$CACHES" ]; then
            echo "No old cache entries found"
            exit 0
          fi
          
          DELETED=0
          FAILED=0
          for ID in $CACHES; do
            if gh api --method DELETE "/repos/${{ github.repository }}/actions/caches/${ID}" > /dev/null 2>&1; then
              DELETED=$((DELETED + 1))
            else
              FAILED=$((FAILED + 1))
              echo "⚠️ Failed to delete cache ID: $ID"
            fi
          done
          
          echo "Cache cleanup: ${DELETED} deleted, ${FAILED} failed"
          [ $FAILED -eq 0 ] || exit 1
  Start-Build:
    name: "Build Kernel"
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.build_system == 'KLEAF' && 90 || 60 }}
    needs: prepare-matrix
    strategy:
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
      fail-fast: false

    env:
      PERSONAL_TOKEN:              ${{ secrets.PERSONAL_TOKEN }}
      TELEGRAM_BOT_TOKEN:          ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:            ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_THREAD_ID_ARTIFACT: ${{ secrets.TELEGRAM_THREAD_ID_ARTIFACT }}
      TELEGRAM_THREAD_ID_LOG:      ${{ secrets.TELEGRAM_THREAD_ID_LOG }}
      USE_KERNEL_CACHE:            "true"
      USE_AK3_CACHE:                "true"
      ROOT_SOLUTION:                ${{ matrix.root_solution }}
      SUSFS_ENABLED:                ${{ matrix.susfs }}
      KERNEL_VERSION:              ${{ inputs.kernel_version }}
      ENABLE_LTO:                  ${{ inputs.enable_lto }}
      WARMING_MODE:                ${{ inputs.warming_mode }}
      BUILD_SYSTEM:                ${{ inputs.build_system }}
      ADDONS:                      ${{ needs.prepare-matrix.outputs.addons }}
      # MAKE only — KLEAF uses Bazel internal cache
      CCACHE_DIR:                  ${{ inputs.build_system == 'MAKE' && format('{0}/.ccache', github.workspace) || '' }}
      CCACHE_MAXSIZE:              ${{ inputs.build_system == 'MAKE' && '5G' || '' }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6

      - name: "Free Disk Space"
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: "Setup Swap Space"
        uses: thejerrybao/setup-swap-space@v1
        with:
          swap-size-gb: 12

      - name: "Restore Arsenal Cache"
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/clang-cache
            ~/ccache-bin
            ~/ak3-cache
            ~/kernel-cache
            ~/.apt-cache
          key: arsenal-${{ inputs.build_system }}-${{ inputs.kernel_version }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: arsenal-${{ inputs.build_system }}-${{ inputs.kernel_version }}-${{ github.ref_name }}-

      - name: "Restore ccache"
        if: inputs.build_system != 'KLEAF'
        uses: ./.github/actions/restore-caches
        with:
          ccache-prefix: ccache-data-${{ matrix.root_solution }}${{ matrix.susfs && '-susfs' || '' }}-${{ inputs.kernel_version }}-${{ inputs.enable_lto != 'NONE' && format('lto-{0}-', inputs.enable_lto) || '' }}${{ github.ref_name }}-
          gh-token: ${{ secrets.PERSONAL_TOKEN }}

      - name: "Disk Usage"
        run: df -h && du -sh ~/kernel-cache/ 2>/dev/null || true

      - name: "Build"
        run: bash build.sh

      - name: "Ccache Stats"
        if: always() && inputs.build_system != 'KLEAF'
        run: ~/ccache-bin/ccache --show-stats

      - name: "Save ccache"
        if: always() && inputs.build_system != 'KLEAF'
        uses: ./.github/actions/save-caches
        with:
          ccache-prefix: ccache-data-${{ matrix.root_solution }}${{ matrix.susfs && '-susfs' || '' }}-${{ inputs.kernel_version }}-${{ inputs.enable_lto != 'NONE' && format('lto-{0}-', inputs.enable_lto) || '' }}${{ github.ref_name }}-
          gh-token: ${{ secrets.PERSONAL_TOKEN }}

      - name: "Upload Build Info"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-info-${{ matrix.root_solution }}${{ matrix.susfs && '-susfs' || '' }}
          path: /tmp/build-info.txt
          retention-days: 1
          if-no-files-found: ignore

          
