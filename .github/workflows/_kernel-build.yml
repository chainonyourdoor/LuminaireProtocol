name: "🔧 Kernel Build"

on:
  workflow_call:
    inputs:
      variant:
        type: string
        default: "VANILLA"
      update_arsenal:
        type: string
        default: "no"
      enable_lto:
        type: string
        default: "NONE"
    secrets:
      PERSONAL_TOKEN:
        required: true
      TELEGRAM_BOT_TOKEN:
        required: false
      TELEGRAM_CHAT_ID:
        required: false
      TELEGRAM_THREAD_ID_BUILD:
        required: false
      TELEGRAM_THREAD_ID_LOG:
        required: false

env:
  DEBIAN_FRONTEND: noninteractive

jobs:

  # ======================================================
  # 📦 PREP
  # ======================================================
  prep:
    name: "📦 Prep Arsenal"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PERSONAL_TOKEN:   ${{ secrets.PERSONAL_TOKEN }}
      PREP_MODE:        "true"
      USE_CLANG_CACHE:  ${{ inputs.update_arsenal != 'yes' }}
      USE_KERNEL_CACHE: ${{ inputs.update_arsenal != 'yes' }}
      USE_AK3_CACHE:    ${{ inputs.update_arsenal != 'yes' }}

    steps:
      - name: "🌀 Clone LuminaireProtocol"
        run: |
          git clone --filter=blob:none \
            "https://x-access-token:${PERSONAL_TOKEN}@github.com/chainonyourdoor/LuminaireProtocol" .

      - name: "♻️ Restore arsenal"
        if: inputs.update_arsenal != 'yes'
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/clang-cache
            ~/ccache-bin
            ~/ak3-cache
            ~/kernel-cache
            ~/.apt-cache
          key: arsenal-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: arsenal-${{ github.ref_name }}-

      - name: "📦 Run Prep"
        run: bash build.sh

      - name: "💾 Save arsenal"
        if: always()
        uses: actions/cache/save@v5
        with:
          path: |
            ~/clang-cache
            ~/ccache-bin
            ~/ak3-cache
            ~/kernel-cache
            ~/.apt-cache
          key: arsenal-${{ github.ref_name }}-${{ github.run_id }}

      - name: "🧹 Cleanup old arsenal"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          CACHES=$(gh api \
            "/repos/${{ github.repository }}/actions/caches?per_page=100" \
            --jq ".actions_caches[] | select(.key | startswith(\"arsenal-${{ github.ref_name }}-\")) | select(.key != \"arsenal-${{ github.ref_name }}-${{ github.run_id }}\") | .id")
          if [ -n "$CACHES" ]; then
            for ID in $CACHES; do
              gh api --method DELETE "/repos/${{ github.repository }}/actions/caches/${ID}" || true
            done
          fi

  # ======================================================
  # 🏗️ BUILD
  # ======================================================
  build:
    name: "✨ Build — ${{ inputs.variant }}"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: prep

    env:
      PERSONAL_TOKEN:           ${{ secrets.PERSONAL_TOKEN }}
      TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_THREAD_ID_BUILD: ${{ secrets.TELEGRAM_THREAD_ID_BUILD }}
      TELEGRAM_THREAD_ID_LOG:   ${{ secrets.TELEGRAM_THREAD_ID_LOG }}
      USE_KERNEL_CACHE:         "true"
      USE_AK3_CACHE:            "true"
      USE_CLANG_CACHE:          "true"
      CCACHE_IS_KERNEL_COMPILING: "true"
      CCACHE_DIR:               ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE:           "5G"
      VARIANT:                  ${{ inputs.variant }}
      ENABLE_LTO:               ${{ inputs.enable_lto }}

    steps:
      - name: "🌀 Clone LuminaireProtocol"
        run: |
          git clone --filter=blob:none \
            "https://x-access-token:${PERSONAL_TOKEN}@github.com/chainonyourdoor/LuminaireProtocol" .

      - name: "🧰 Setup Swap Space"
        uses: thejerrybao/setup-swap-space@v1
        with:
          swap-size-gb: 12

      - uses: ./.github/actions/restore-caches
        with:
          arsenal-key: arsenal-${{ github.ref_name }}-${{ github.run_id }}
          ccache-key: ccache-data-${{ inputs.variant }}-${{ inputs.enable_lto == 'THIN' && 'lto-' || '' }}${{ github.ref_name }}-${{ github.run_id }}
          ccache-restore-keys: ccache-data-${{ inputs.variant }}-${{ inputs.enable_lto == 'THIN' && 'lto-' || '' }}${{ github.ref_name }}-

      - name: "✨ Build"
        run: bash build.sh

      - uses: ./.github/actions/save-caches
        if: always()
        with:
          ccache-key: ccache-data-${{ inputs.variant }}-${{ inputs.enable_lto == 'THIN' && 'lto-' || '' }}${{ github.ref_name }}-${{ github.run_id }}
          ccache-prefix: ccache-data-${{ inputs.variant }}-${{ inputs.enable_lto == 'THIN' && 'lto-' || '' }}${{ github.ref_name }}-
          gh-token: ${{ secrets.PERSONAL_TOKEN }}
