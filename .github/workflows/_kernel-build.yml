name: "Kernel Build"

on:
  workflow_call:
    inputs:
      build_system:
        type: string
        default: "MAKE"
      vanilla:
        type: boolean
        default: true
      resukisu_susfs:
        type: boolean
        default: false
      kernel_version:
        type: string
        default: "6.1"
      update_arsenal:
        type: string
        default: "no"
      enable_lto:
        type: string
        default: "NONE"
      warming_mode:
        type: string
        default: "false"
      addons:
        type: string
        default: ""
    secrets:
      PERSONAL_TOKEN:
        required: true
      TELEGRAM_BOT_TOKEN:
        required: false
      TELEGRAM_CHAT_ID:
        required: false
      TELEGRAM_THREAD_ID_ARTIFACT:
        required: false
      TELEGRAM_THREAD_ID_LOG:
        required: false

env:
  DEBIAN_FRONTEND: noninteractive

jobs:

  # ======================================================
  # PREPARE MATRIX + ARSENAL
  # ======================================================
  prepare-matrix:
    name: "Prepare Arsenal"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}

    env:
      PERSONAL_TOKEN:  ${{ secrets.PERSONAL_TOKEN }}
      USE_KERNEL_CACHE: ${{ inputs.update_arsenal != 'yes' }}
      USE_AK3_CACHE:    ${{ inputs.update_arsenal != 'yes' }}
      KERNEL_VERSION:   ${{ inputs.kernel_version }}
      BUILD_SYSTEM:     ${{ inputs.build_system }}
      CCACHE_DIR:       ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE:   "5G"

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6

      - name: "Free Disk Space"
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: "Build Variant Matrix"
        id: set
        run: |
          variants=()
          ${{ inputs.vanilla }}         && variants+=("VANILLA")
          ${{ inputs.resukisu_susfs }}   && variants+=("RESUKISU_SUSFS")

          if [ ${#variants[@]} -eq 0 ]; then
            echo "No variants selected!"
            exit 1
          fi

          echo "matrix=$(jq -cn '$ARGS.positional' --args "${variants[@]}")" >> $GITHUB_OUTPUT

      - name: "Restore Arsenal Cache"
        if: inputs.update_arsenal != 'yes'
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/clang-cache
            ~/ccache-bin
            ~/ak3-cache
            ~/kernel-cache
            ~/.apt-cache
          key: arsenal-${{ inputs.build_system }}-${{ inputs.kernel_version }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: arsenal-${{ inputs.build_system }}-${{ inputs.kernel_version }}-${{ github.ref_name }}-

      - name: "Prepare Arsenal"
        run: bash arsenal.sh

      - name: "Save Arsenal Cache"
        if: always()
        uses: actions/cache/save@v5
        with:
          path: |
            ~/clang-cache
            ~/ccache-bin
            ~/ak3-cache
            ~/kernel-cache
            ~/.apt-cache
          key: arsenal-${{ inputs.build_system }}-${{ inputs.kernel_version }}-${{ github.ref_name }}-${{ github.run_id }}

      - name: "Cleanup Old Arsenal"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          CACHES=$(gh api \
            "/repos/${{ github.repository }}/actions/caches?per_page=100" \
            --jq ".actions_caches[] | select(.key | startswith(\"arsenal-${{ inputs.build_system }}-${{ inputs.kernel_version }}-${{ github.ref_name }}-\")) | select(.key != \"arsenal-${{ inputs.build_system }}-${{ inputs.kernel_version }}-${{ github.ref_name }}-${{ github.run_id }}\") | .id")
          if [ -n "$CACHES" ]; then
            for ID in $CACHES; do
              gh api --method DELETE "/repos/${{ github.repository }}/actions/caches/${ID}" || true
            done
          fi
  Start-Build:
    name: "Build Kernel"
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.build_system == 'KLEAF' && 90 || 60 }}
    needs: prepare-matrix
    strategy:
      matrix:
        variant: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
      fail-fast: false

    env:
      PERSONAL_TOKEN:              ${{ secrets.PERSONAL_TOKEN }}
      TELEGRAM_BOT_TOKEN:          ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:            ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_THREAD_ID_ARTIFACT: ${{ secrets.TELEGRAM_THREAD_ID_ARTIFACT }}
      TELEGRAM_THREAD_ID_LOG:      ${{ secrets.TELEGRAM_THREAD_ID_LOG }}
      USE_KERNEL_CACHE:            "true"
      USE_AK3_CACHE:               "true"
      CCACHE_DIR:                  ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE:              "5G"
      VARIANT:                     ${{ matrix.variant }}
      KERNEL_VERSION:              ${{ inputs.kernel_version }}
      ENABLE_LTO:                  ${{ inputs.enable_lto }}
      WARMING_MODE:                ${{ inputs.warming_mode }}
      BUILD_SYSTEM:                ${{ inputs.build_system }}
      ADDONS:                      ${{ inputs.addons }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6

      - name: "Free Disk Space"
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: "Setup Swap Space"
        uses: thejerrybao/setup-swap-space@v1
        with:
          swap-size-gb: 12

      - name: "Restore Arsenal Cache"
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/clang-cache
            ~/ccache-bin
            ~/ak3-cache
            ~/kernel-cache
            ~/.apt-cache
          key: arsenal-${{ inputs.build_system }}-${{ inputs.kernel_version }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: arsenal-${{ inputs.build_system }}-${{ inputs.kernel_version }}-${{ github.ref_name }}-

      - name: "Restore ccache"
        if: inputs.build_system != 'KLEAF'
        uses: ./.github/actions/restore-caches
        with:
          ccache-prefix: ccache-data-${{ matrix.variant }}-${{ inputs.kernel_version }}-${{ inputs.enable_lto != 'NONE' && 'lto-' || '' }}${{ github.ref_name }}-
          gh-token: ${{ secrets.PERSONAL_TOKEN }}

      - name: "Disk Usage"
        run: df -h && du -sh ~/kernel-cache/ 2>/dev/null || true

      - name: "Build"
        run: bash build.sh

      - name: "Ccache Stats"
        if: always() && inputs.build_system != 'KLEAF'
        run: ~/ccache-bin/ccache --show-stats

      - name: "Save ccache"
        if: always() && inputs.build_system != 'KLEAF'
        uses: ./.github/actions/save-caches
        with:
          ccache-prefix: ccache-data-${{ matrix.variant }}-${{ inputs.kernel_version }}-${{ inputs.enable_lto != 'NONE' && 'lto-' || '' }}${{ github.ref_name }}-
          gh-token: ${{ secrets.PERSONAL_TOKEN }}

      - name: "Upload Build Info"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-info-${{ matrix.variant }}
          path: /tmp/build-info.txt
          retention-days: 1
          if-no-files-found: ignore

          
