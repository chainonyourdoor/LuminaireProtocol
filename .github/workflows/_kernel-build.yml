name: "Kernel Build"

on:
  workflow_call:
    inputs:
      variant:
        type: string
        default: "VANILLA"
      kernel_version:
        type: string
        default: "6.1"
      update_arsenal:
        type: string
        default: "no"
      enable_lto:
        type: string
        default: "NONE"
      warming_mode:
        type: string
        default: "false"
    secrets:
      PERSONAL_TOKEN:
        required: true
      TELEGRAM_BOT_TOKEN:
        required: false
      TELEGRAM_CHAT_ID:
        required: false

env:
  DEBIAN_FRONTEND: noninteractive

jobs:

  # ======================================================
  # 🧰 PREPARATION
  # ======================================================
  prep:
    name: "Arsenal Preparation"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PERSONAL_TOKEN:   ${{ secrets.PERSONAL_TOKEN }}
      PREPARE_ARSENAL:        "true"
      USE_KERNEL_CACHE: ${{ inputs.update_arsenal != 'yes' }}
      USE_AK3_CACHE:    ${{ inputs.update_arsenal != 'yes' }}
      KERNEL_VERSION:   ${{ inputs.kernel_version }}
      VARIANT:          ${{ inputs.variant }}

    steps:
      - name: "Clone LuminaireProtocol"
        run: |
          git clone --filter=blob:none \
            "https://x-access-token:${PERSONAL_TOKEN}@github.com/chainonyourdoor/LuminaireProtocol" .

      - name: "Restore Arsenal Cache"
        if: inputs.update_arsenal != 'yes'
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/clang-cache
            ~/ccache-bin
            ~/ak3-cache
            ~/kernel-cache
            ~/.apt-cache
          key: arsenal-${{ inputs.kernel_version }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: arsenal-${{ inputs.kernel_version }}-${{ github.ref_name }}-

      - name: "Run Preparation"
        run: bash build.sh

      - name: "Save Arsenal Cache"
        if: always()
        uses: actions/cache/save@v5
        with:
          path: |
            ~/clang-cache
            ~/ccache-bin
            ~/ak3-cache
            ~/kernel-cache
            ~/.apt-cache
          key: arsenal-${{ inputs.kernel_version }}-${{ github.ref_name }}-${{ github.run_id }}

      - name: "Cleanup Old Arsenal"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          CACHES=$(gh api \
            "/repos/${{ github.repository }}/actions/caches?per_page=100" \
            --jq ".actions_caches[] | select(.key | startswith(\"arsenal-${{ inputs.kernel_version }}-${{ github.ref_name }}-\")) | select(.key != \"arsenal-${{ inputs.kernel_version }}-${{ github.ref_name }}-${{ github.run_id }}\") | .id")
          if [ -n "$CACHES" ]; then
            for ID in $CACHES; do
              gh api --method DELETE "/repos/${{ github.repository }}/actions/caches/${ID}" || true
            done
          fi

  # ======================================================
  # 🏗️ BUILD
  # ======================================================
  Start-Build:
    name: "${{ inputs.variant }}"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: prep

    env:
      PERSONAL_TOKEN:           ${{ secrets.PERSONAL_TOKEN }}
      TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
      USE_KERNEL_CACHE:         "true"
      USE_AK3_CACHE:            "true"
      PREPARE_ARSENAL:          "false"
      CCACHE_DIR:               ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE:           "5G"
      VARIANT:                  ${{ inputs.variant }}
      KERNEL_VERSION:           ${{ inputs.kernel_version }}
      ENABLE_LTO:               ${{ inputs.enable_lto }}
      WARMING_MODE:             ${{ inputs.warming_mode }}

    steps:
      - name: "Clone LuminaireProtocol"
        run: |
          git clone --filter=blob:none \
            "https://x-access-token:${PERSONAL_TOKEN}@github.com/chainonyourdoor/LuminaireProtocol" .

      - name: "Setup Swap Space"
        uses: thejerrybao/setup-swap-space@v1
        with:
          swap-size-gb: 12

      - name: "Restore ${{ inputs.variant }} Cache"
        uses: ./.github/actions/restore-caches
        with:
          arsenal-key: arsenal-${{ inputs.kernel_version }}-${{ github.ref_name }}-${{ github.run_id }}
          ccache-key: ccache-data-${{ inputs.variant }}-${{ inputs.kernel_version }}-${{ inputs.enable_lto == 'THIN' && 'lto-' || '' }}${{ github.ref_name }}-${{ github.run_id }}
          ccache-restore-keys: ccache-data-${{ inputs.variant }}-${{ inputs.kernel_version }}-${{ inputs.enable_lto == 'THIN' && 'lto-' || '' }}${{ github.ref_name }}-
          gh-token: ${{ secrets.PERSONAL_TOKEN }}

      - name: "Build"
        run: bash build.sh
        
      - name: "📊 Ccache Stats"
        if: always ()
        run: ~/ccache-bin/ccache --show-stats
        
      - name: "Save ${{ inputs.variant }} Cache"
        uses: ./.github/actions/save-caches
        if: always()
        with:
          ccache-key: ccache-data-${{ inputs.variant }}-${{ inputs.kernel_version }}-${{ inputs.enable_lto == 'THIN' && 'lto-' || '' }}${{ github.ref_name }}-${{ github.run_id }}
          ccache-prefix: ccache-data-${{ inputs.variant }}-${{ inputs.kernel_version }}-${{ inputs.enable_lto == 'THIN' && 'lto-' || '' }}${{ github.ref_name }}-
          gh-token: ${{ secrets.PERSONAL_TOKEN }}
