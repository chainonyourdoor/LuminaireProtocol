name: "✨ Luminaire Protocol"
run-name: "${{ inputs.kernel_version }} | ${{ inputs.build_system }} (${{ inputs.warming_mode == 'true' && 'Warming' || 'Build' }})"

on:
  workflow_dispatch:
    inputs:
      build_system:
        description: "Build System"
        type: choice
        default: "Kleaf - AOSP"
        options:
          - "Kleaf - AOSP"
          - "Make - Cirrus"
          - "Make - Neutron"
          - "Make - WeebX"
          - "Make - Zyc"
      kernel_version:
        description: "Kernel Version"
        type: choice
        default: "6.1"
        options:
          - "5.10"
          - "5.15"
          - "6.1"
          - "6.6"
          - "6.12"
      vanilla:
        description: "VANILLA"
        type: boolean
        default: true
      resukisu:
        description: "ReSukiSU"
        type: boolean
        default: false
      sukisu:
        description: "SukiSU-Ultra"
        type: boolean
        default: false
      susfs:
        description: "SuSFS"
        type: choice
        default: "enable"
        options:
          - "enable"
          - "disable"
      mountless_engine:
        description: "Mountless Engine"
        type: choice
        default: "none"
        options:
          - "none"
          - "nomount"
          - "zeromount"
      bbg:
        description: "BBG (Baseband Guard)"
        type: boolean
        default: true
      rekernel:
        description: "Re:Kernel (Binder/Signal Netlink)"
        type: boolean
        default: false
      droidspaces:
        description: "Droidspaces"
        type: boolean
        default: false
      update_arsenal:
        description: "Update Arsenal"
        type: choice
        default: "no"
        options:
          - "yes"
          - "no"
      enable_lto:
        description: "⚠️ LTO"
        type: choice
        default: "NONE"
        options:
          - "NONE"
          - "THIN"
          - "FULL"
      warming_mode:
        description: "Warming Mode (skip release)"
        type: choice
        default: "false"
        options:
          - "false"
          - "true"
      release_channel:
        description: "Send to release channel"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEBIAN_FRONTEND: noninteractive
  IS_MAKE: ${{ startsWith(inputs.build_system, 'Make') }}

jobs:

  # ======================================================
  # PREPARE MATRIX + ARSENAL
  # ======================================================
  prepare-matrix:
    name: "Prepare Arsenal"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}

    env:
      PERSONAL_TOKEN:   ${{ secrets.PERSONAL_TOKEN }}
      USE_KERNEL_CACHE: ${{ inputs.update_arsenal != 'yes' }}
      USE_AK3_CACHE:    ${{ inputs.update_arsenal != 'yes' }}
      USE_CLANG_CACHE:  ${{ inputs.update_arsenal != 'yes' }}
      KERNEL_VERSION:   ${{ inputs.kernel_version }}
      BUILD_SYSTEM:     ${{ inputs.build_system }}
      CCACHE_DIR:       ${{ startsWith(inputs.build_system, 'Make') && format('{0}/.ccache', github.workspace) || '' }}
      CCACHE_MAXSIZE:   ${{ startsWith(inputs.build_system, 'Make') && '5G' || '' }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@v7

      - name: "Free Disk Space"
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: "Build Variant Matrix"
        id: set
        run: |
          if ${{ inputs.sukisu }} && ${{ inputs.susfs == 'enable' }}; then
            echo "::error::SukiSU-Ultra is incompatible with SuSFS (hook architecture conflict). Disable SuSFS or switch to ReSukiSU."
            exit 1
          fi

          variants=()
          ${{ inputs.vanilla }}  && variants+=('{\"root_solution\":\"VANILLA\",\"susfs\":false}')
          ${{ inputs.resukisu }} && variants+=('{\"root_solution\":\"RESUKISU\",\"susfs\":${{ inputs.susfs == 'enable' }}}')
          ${{ inputs.sukisu }}   && variants+=('{\"root_solution\":\"SUKISU\",\"susfs\":false}')

          if [ ${#variants[@]} -eq 0 ]; then
            echo "No root solutions selected!"
            exit 1
          fi

          matrix_json=$(printf '%s\n' "${variants[@]}" | jq -cs '{include: .}')
          echo "matrix=${matrix_json}" >> $GITHUB_OUTPUT

      - name: "Setup Arsenal"
        id: setup-arsenal
        uses: ./.github/actions/setup-arsenal
        with:
          build-system:   ${{ inputs.build_system }}
          kernel-version: ${{ inputs.kernel_version }}
          ref-name:       ${{ github.ref_name }}
          run-id:         ${{ github.run_id }}
          update-arsenal: ${{ inputs.update_arsenal }}
          gh-token:       ${{ secrets.PERSONAL_TOKEN }}

      - name: "Prepare Arsenal"
        run: bash arsenal.sh

      - name: "Save Arsenal Cache"
        if: always()
        uses: actions/cache/save@v6
        with:
          path: |
            ~/ccache-bin
            ~/ak3-cache
            ~/kernel-cache
            ~/.apt-cache
          key: arsenal-${{ startsWith(inputs.build_system, 'Make') && 'MAKE' || 'KLEAF' }}-${{ inputs.kernel_version }}-${{ github.ref_name }}-${{ github.run_id }}

      - name: "Invalidate Old Clang Cache"
        if: startsWith(inputs.build_system, 'Make') && inputs.update_arsenal == 'yes'
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          CACHE_KEY="clang-${{ steps.setup-arsenal.outputs.clang-variant }}"
          CACHE_ID=$(gh api "/repos/${{ github.repository }}/actions/caches?key=${CACHE_KEY}" \
            --jq '.actions_caches[0].id // empty' 2>/dev/null || true)
          if [ -n "$CACHE_ID" ]; then
            gh api --method DELETE "/repos/${{ github.repository }}/actions/caches/${CACHE_ID}" > /dev/null 2>&1 || true
            echo "Clang cache invalidated ✅ (${CACHE_KEY})"
          else
            echo "No existing clang cache found for ${CACHE_KEY}"
          fi

      - name: "Save Clang Cache"
        if: always() && startsWith(inputs.build_system, 'Make') && steps.setup-arsenal.outputs.clang-cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: ~/clang-cache
          key: clang-${{ steps.setup-arsenal.outputs.clang-variant }}

      - name: "Cleanup Old Arsenal"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          CACHES=$(gh api \
            "/repos/${{ github.repository }}/actions/caches?per_page=100" \
            --jq ".actions_caches[] | select(.key | startswith(\"arsenal-${{ startsWith(inputs.build_system, 'Make') && 'MAKE' || 'KLEAF' }}-${{ inputs.kernel_version }}-${{ github.ref_name }}-\")) | select(.key != \"arsenal-${{ startsWith(inputs.build_system, 'Make') && 'MAKE' || 'KLEAF' }}-${{ inputs.kernel_version }}-${{ github.ref_name }}-${{ github.run_id }}\") | .id")

          if [ -z "$CACHES" ]; then
            echo "No old cache entries found"
            exit 0
          fi

          DELETED=0
          FAILED=0
          for ID in $CACHES; do
            if gh api --method DELETE "/repos/${{ github.repository }}/actions/caches/${ID}" > /dev/null 2>&1; then
              DELETED=$((DELETED + 1))
            else
              FAILED=$((FAILED + 1))
              echo "⚠️ Failed to delete cache ID: $ID"
            fi
          done

          echo "Cache cleanup: ${DELETED} deleted, ${FAILED} failed"
          [ $FAILED -eq 0 ] || exit 1

  # ======================================================
  # BUILD PER VARIANT (paralel)
  # ======================================================
  Start-Build:
    name: "Build Kernel (${{ matrix.root_solution }}${{ matrix.susfs && '+SUSFS' || '' }})"
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.build_system == 'Kleaf - AOSP' && 90 || 60 }}
    needs: prepare-matrix
    strategy:
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
      fail-fast: false

    env:
      PERSONAL_TOKEN:              ${{ secrets.PERSONAL_TOKEN }}
      TELEGRAM_BOT_TOKEN:          ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:            ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_THREAD_ID_ARTIFACT: ${{ secrets.TELEGRAM_THREAD_ID_ARTIFACT }}
      TELEGRAM_CHANNEL_ID:         ${{ secrets.TELEGRAM_CHANNEL_ID }}
      USE_KERNEL_CACHE:            "true"
      USE_AK3_CACHE:               "true"
      USE_CLANG_CACHE:             "true"
      ROOT_SOLUTION:               ${{ matrix.root_solution }}
      SUSFS_ENABLED:               ${{ matrix.susfs }}
      KERNEL_VERSION:              ${{ inputs.kernel_version }}
      ENABLE_LTO:                  ${{ inputs.enable_lto }}
      WARMING_MODE:                ${{ inputs.warming_mode }}
      RELEASE_CHANNEL:             ${{ inputs.release_channel }}
      BUILD_SYSTEM:                ${{ inputs.build_system }}
      ADDONS:                      "${{ inputs.bbg && 'bbg,' || '' }}${{ inputs.rekernel && 'rekernel,' || '' }}${{ inputs.droidspaces && 'droidspaces,' || '' }}${{ inputs.mountless_engine != 'none' && format('{0},', inputs.mountless_engine) || '' }}"
      CCACHE_DIR:                  ${{ startsWith(inputs.build_system, 'Make') && format('{0}/.ccache', github.workspace) || '' }}
      CCACHE_MAXSIZE:              ${{ startsWith(inputs.build_system, 'Make') && '5G' || '' }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@v7

      - name: "Free Disk Space"
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: "Setup Swap Space"
        uses: thejerrybao/setup-swap-space@v1
        with:
          swap-size-gb: 12

      - name: "Setup Build Environment"
        id: setup-build-env
        uses: ./.github/actions/setup-build-env
        with:
          build-system:   ${{ inputs.build_system }}
          kernel-version: ${{ inputs.kernel_version }}
          ref-name:       ${{ github.ref_name }}
          run-id:         ${{ github.run_id }}
          root-solution:  ${{ matrix.root_solution }}
          susfs:          ${{ matrix.susfs }}
          enable-lto:     ${{ inputs.enable_lto }}
          gh-token:       ${{ secrets.PERSONAL_TOKEN }}

      - name: "Disk Usage"
        run: df -h && du -sh ~/kernel-cache/ 2>/dev/null || true

      - name: "Build"
        run: bash build.sh

      - name: "Ccache Stats"
        if: always() && startsWith(inputs.build_system, 'Make')
        run: ~/ccache-bin/ccache --show-stats

      - name: "Save ccache"
        if: always() && startsWith(inputs.build_system, 'Make')
        uses: ./.github/actions/save-caches
        with:
          ccache-prefix: ccache-data-${{ matrix.root_solution }}${{ matrix.susfs && '-susfs' || '' }}-${{ inputs.kernel_version }}-${{ inputs.enable_lto != 'NONE' && format('lto-{0}-', inputs.enable_lto) || '' }}${{ steps.setup-build-env.outputs.clang-variant }}-${{ github.ref_name }}-
          gh-token: ${{ secrets.PERSONAL_TOKEN }}

      - name: "Upload Build Info"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-info-${{ matrix.root_solution }}${{ matrix.susfs && '-susfs' || '' }}
          path: /tmp/build-info.txt
          retention-days: 1
          if-no-files-found: ignore
