name: "✨ Luminaire Protocol"

on:
  workflow_dispatch:
    inputs:
      UPDATE_ARSENAL:
        description: "Update Arsenal"
        type: choice
        default: "no"
        options:
          - "yes"
          - "no"
      ENABLE_LTO:
        description: "⚠️ Enable LTO"
        type: choice
        default: "NONE"
        options:
          - "NONE"
          - "THIN"

env:
  DEBIAN_FRONTEND: noninteractive

jobs:

  # ======================================================
  # 📦 PREP — Download tools, save arsenal cache
  # ======================================================
  prep:
    name: "📦 Prep Arsenal"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PERSONAL_TOKEN:   ${{ secrets.PERSONAL_TOKEN }}
      PREP_MODE:        "true"
      USE_CLANG_CACHE:  ${{ inputs.UPDATE_ARSENAL != 'yes' }}
      USE_KERNEL_CACHE: ${{ inputs.UPDATE_ARSENAL != 'yes' }}
      USE_AK3_CACHE:    ${{ inputs.UPDATE_ARSENAL != 'yes' }}

    steps:
      - name: "🌀 Clone LuminaireProtocol"
        run: |
          git clone --filter=blob:none \
            "https://x-access-token:${PERSONAL_TOKEN}@github.com/chainonyourdoor/LuminaireProtocol" \
            .

      - name: "♻️ Restore arsenal cache"
        if: inputs.UPDATE_ARSENAL != 'yes'
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/clang-cache
            ~/ccache-bin
            ~/ak3-cache
            ~/kernel-cache
            ~/.apt-cache
          key: arsenal-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: arsenal-${{ github.ref_name }}-

      - name: "📦 Run Prep"
        run: bash build.sh

      - name: "💾 Save arsenal cache"
        if: always()
        uses: actions/cache/save@v5
        with:
          path: |
            ~/clang-cache
            ~/ccache-bin
            ~/ak3-cache
            ~/kernel-cache
            ~/.apt-cache
          key: arsenal-${{ github.ref_name }}-${{ github.run_id }}

      - name: "🧹 Cleanup old arsenal caches"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          CACHES=$(gh api \
            "/repos/${{ github.repository }}/actions/caches?per_page=100" \
            --jq ".actions_caches[] | select(.key | startswith(\"arsenal-${{ github.ref_name }}-\")) | select(.key != \"arsenal-${{ github.ref_name }}-${{ github.run_id }}\") | .id")
          if [ -n "$CACHES" ]; then
            for ID in $CACHES; do
              gh api --method DELETE "/repos/${{ github.repository }}/actions/caches/${ID}" || true
            done
          fi

  # ======================================================
  # 🏗️ BUILD — Restore arsenal, build kernel
  # ======================================================
  build:
    name: "✨ Build Luminaire Protocol"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: prep

    env:
      PERSONAL_TOKEN:           ${{ secrets.PERSONAL_TOKEN }}
      TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_THREAD_ID_BUILD: ${{ secrets.TELEGRAM_THREAD_ID_BUILD }}
      TELEGRAM_THREAD_ID_LOG:   ${{ secrets.TELEGRAM_THREAD_ID_LOG }}
      USE_KERNEL_CACHE:         "true"
      USE_AK3_CACHE:            "true"
      CCACHE_DIR:               ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE:           "5G"
      ENABLE_LTO:               ${{ inputs.ENABLE_LTO }}

    steps:
      - name: "🌀 Clone LuminaireProtocol"
        run: |
          git clone --filter=blob:none \
            "https://x-access-token:${PERSONAL_TOKEN}@github.com/chainonyourdoor/LuminaireProtocol" \
            .

      - name: "🧰 Setup Swap Space"
        uses: thejerrybao/setup-swap-space@v1
        with:
          swap-size-gb: 12

      - name: "♻️ Restore arsenal cache"
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/clang-cache
            ~/ccache-bin
            ~/ak3-cache
            ~/kernel-cache
            ~/.apt-cache
          key: arsenal-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: arsenal-${{ github.ref_name }}-

      - name: "♻️ Restore ccache data"
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-data-${{ inputs.ENABLE_LTO == 'THIN' && 'lto-' || '' }}${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: ccache-data-${{ inputs.ENABLE_LTO == 'THIN' && 'lto-' || '' }}${{ github.ref_name }}-

      - name: "✨ Build"
        env:
          USE_CLANG_CACHE:            "true"
          CCACHE_IS_KERNEL_COMPILING: "true"
        run: bash build.sh

      - name: "💾 Save ccache data"
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-data-${{ inputs.ENABLE_LTO == 'THIN' && 'lto-' || '' }}${{ github.ref_name }}-${{ github.run_id }}

      - name: "🧹 Cleanup old caches"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          cleanup_cache() {
            local PREFIX="$1"
            local CURRENT_KEY="$2"
            local CACHES
            CACHES=$(gh api \
              "/repos/${{ github.repository }}/actions/caches?per_page=100" \
              --jq ".actions_caches[] | select(.key | startswith(\"${PREFIX}\")) | select(.key != \"${CURRENT_KEY}\") | .id")
            if [ -n "$CACHES" ]; then
              for ID in $CACHES; do
                gh api --method DELETE "/repos/${{ github.repository }}/actions/caches/${ID}" || true
              done
            fi
          }
          LTO_PREFIX="${{ inputs.ENABLE_LTO == 'THIN' && 'lto-' || '' }}"
          cleanup_cache "ccache-data-${LTO_PREFIX}${{ github.ref_name }}-" \
            "ccache-data-${LTO_PREFIX}${{ github.ref_name }}-${{ github.run_id }}"
