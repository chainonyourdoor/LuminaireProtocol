name: "✨ Luminaire Protocol"

on:
  workflow_dispatch:
    inputs:
      variant:
        description: "Variant"
        type: choice
        default: "VANILLA"
        options:
          - "VANILLA"
      update_arsenal:
        description: "Update Arsenal"
        type: choice
        default: "no"
        options:
          - "yes"
          - "no"
      enable_lto:
        description: "⚠️ Enable LTO"
        type: choice
        default: "NONE"
        options:
          - "NONE"
          - "THIN"

jobs:
  kernel-build:
    uses: ./.github/workflows/_kernel-build.yml
    with:
      variant:        ${{ inputs.variant }}
      update_arsenal: ${{ inputs.update_arsenal }}
      enable_lto:     ${{ inputs.enable_lto }}
    secrets:
      PERSONAL_TOKEN:           ${{ secrets.PERSONAL_TOKEN }}
      TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_THREAD_ID_BUILD: ${{ secrets.TELEGRAM_THREAD_ID_BUILD }}
      TELEGRAM_THREAD_ID_LOG:   ${{ secrets.TELEGRAM_THREAD_ID_LOG }}
