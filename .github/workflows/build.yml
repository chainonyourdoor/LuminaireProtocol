name: "✨ Luminaire Protocol"
run-name: "${{ inputs.kernel_version }} | ${{ inputs.enable_lto != 'NONE' && format('{0} LTO x ', inputs.enable_lto) || '' }}${{ split(inputs.build_system, ' - ')[1] }} (${{ inputs.warming_mode && 'Warming' || 'Build' }})"

on:
  workflow_dispatch:
    inputs:
      build_system:
        description: "Build System"
        type: choice
        default: "Make - Neutron"
        options:
          - "Kleaf - AOSP"
          - "Make - Cirrus"
          - "Make - Neutron"
          - "Make - WeebX"
          - "Make - Zyc"
      kernel_version:
        description: "Kernel Version"
        type: choice
        default: "6.1"
        options:
          - "5.10"
          - "5.15"
          - "6.1"
          - "6.6"
          - "6.12"
      vanilla:
        description: "Vanilla"
        type: boolean
        default: true
      resukisu:
        description: "ReSukiSU"
        type: boolean
        default: false
      sukisu:
        description: "SukiSU-Ultra"
        type: boolean
        default: false
      susfs:
        description: "SuSFS"
        type: choice
        default: "enable"
        options:
          - "enable"
          - "disable"
      mountless_engine:
        description: "Mountless Engine"
        type: choice
        default: "zeromount"
        options:
          - "none"
          - "nomount"
          - "zeromount"
      bbg:
        description: "BBG"
        type: boolean
        default: true
      rekernel:
        description: "Re:Kernel"
        type: boolean
        default: true
      droidspaces:
        description: "Droidspaces"
        type: boolean
        default: true
      enable_lto:
        description: "LTO"
        type: choice
        default: "NONE"
        options:
          - "NONE"
          - "THIN"
          - "FULL"
      warming_mode:
        description: "🔥 Warming Mode"
        type: boolean
        default: false
      release_channel:
        description: "🚀 Telegram Release"
        type: boolean
        default: false
      update_arsenal:
        description: "⚠️ Update Arsenal"
        type: choice
        default: "no"
        options:
          - "yes"
          - "no"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.kernel_version }}
  cancel-in-progress: true

env:
  DEBIAN_FRONTEND: noninteractive
  IS_MAKE: ${{ startsWith(inputs.build_system, 'Make') }}

jobs:

  # ======================================================
  # PREPARE MATRIX + ARSENAL
  # ======================================================
  prepare-matrix:
    name: "Prepare Arsenal"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}

    env:
      PERSONAL_TOKEN:   ${{ secrets.PERSONAL_TOKEN }}
      USE_KERNEL_CACHE: ${{ inputs.update_arsenal != 'yes' }}
      USE_AK3_CACHE:    ${{ inputs.update_arsenal != 'yes' }}
      USE_CLANG_CACHE:  ${{ inputs.update_arsenal != 'yes' }}
      KERNEL_VERSION:   ${{ inputs.kernel_version }}
      BUILD_SYSTEM:     ${{ inputs.build_system }}
      CCACHE_DIR:       ${{ startsWith(inputs.build_system, 'Make') && format('{0}/.ccache', github.workspace) || '' }}
      CCACHE_MAXSIZE:   ${{ startsWith(inputs.build_system, 'Make') && '5G' || '' }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@v7

      - name: "Build Variant Matrix"
        id: set
        env:
          SUSFS_ENABLED: ${{ inputs.susfs == 'enable' }}
        run: |
          if ${{ inputs.sukisu }} && [ "$SUSFS_ENABLED" = "true" ]; then
            echo "::error::SukiSU-Ultra is incompatible with SuSFS (hook architecture conflict). Disable SuSFS or switch to ReSukiSU."
            exit 1
          fi

          variants=()
          ${{ inputs.vanilla }}  && variants+=("{\"root_solution\":\"VANILLA\",\"susfs\":false}")
          ${{ inputs.resukisu }} && variants+=("{\"root_solution\":\"RESUKISU\",\"susfs\":${SUSFS_ENABLED}}")
          ${{ inputs.sukisu }}   && variants+=("{\"root_solution\":\"SUKISU\",\"susfs\":false}")

          if [ ${#variants[@]} -eq 0 ]; then
            echo "No root solutions selected!"
            exit 1
          fi

          matrix_json=$(printf '%s\n' "${variants[@]}" | jq -cs '{include: .}')
          echo "matrix=${matrix_json}" >> $GITHUB_OUTPUT

      - name: "Setup Arsenal"  # restores clang+arsenal cache (auto-saved if missing), then runs arsenal.sh
        id: setup-arsenal
        uses: ./.github/actions/setup-arsenal
        with:
          build-system:   ${{ inputs.build_system }}
          kernel-version: ${{ inputs.kernel_version }}
          ref-name:       ${{ github.ref_name }}
          update-arsenal: ${{ inputs.update_arsenal }}
          gh-token:       ${{ secrets.PERSONAL_TOKEN }}

  # ======================================================
  # BUILD PER VARIANT (paralel)
  # ======================================================
  Start-Build:
    name: "Build Kernel (${{ matrix.root_solution }}${{ matrix.susfs && '+SUSFS' || '' }})"
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: prepare-matrix
    strategy:
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
      fail-fast: false

    env:
      PERSONAL_TOKEN:              ${{ secrets.PERSONAL_TOKEN }}
      TELEGRAM_BOT_TOKEN:          ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:            ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_THREAD_ID_ARTIFACT: ${{ secrets.TELEGRAM_THREAD_ID_ARTIFACT }}
      TELEGRAM_CHANNEL_ID:         ${{ secrets.TELEGRAM_CHANNEL_ID }}
      USE_KERNEL_CACHE:            "true"
      USE_AK3_CACHE:               "true"
      USE_CLANG_CACHE:             "true"
      ROOT_SOLUTION:               ${{ matrix.root_solution }}
      SUSFS_ENABLED:               ${{ matrix.susfs }}
      KERNEL_VERSION:              ${{ inputs.kernel_version }}
      ENABLE_LTO:                  ${{ inputs.enable_lto }}
      WARMING_MODE:                ${{ inputs.warming_mode }}
      RELEASE_CHANNEL:             ${{ inputs.release_channel }}
      BUILD_SYSTEM:                ${{ inputs.build_system }}
      ADDONS:                      "${{ inputs.bbg && 'bbg,' || '' }}${{ inputs.rekernel && 'rekernel,' || '' }}${{ inputs.droidspaces && 'droidspaces,' || '' }}${{ inputs.mountless_engine != 'none' && format('{0},', inputs.mountless_engine) || '' }}"
      CCACHE_DIR:                  ${{ startsWith(inputs.build_system, 'Make') && format('{0}/.ccache', github.workspace) || '' }}
      CCACHE_MAXSIZE:              ${{ startsWith(inputs.build_system, 'Make') && '5G' || '' }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@v7

      - name: "Free Disk Space"
        run: |
          sudo mv /usr/share/dotnet        /tmp/_trash_dotnet        2>/dev/null || true
          sudo mv /usr/local/lib/android   /tmp/_trash_android       2>/dev/null || true
          sudo mv /opt/ghc                 /tmp/_trash_ghc           2>/dev/null || true
          sudo mv /usr/lib/jvm             /tmp/_trash_jvm           2>/dev/null || true
          sudo mv /usr/share/swift         /tmp/_trash_swift         2>/dev/null || true
          sudo mv /usr/local/share/powershell /tmp/_trash_pwsh      2>/dev/null || true
          (sudo nice -n 19 ionice -c 3 rm -rf \
            /tmp/_trash_dotnet /tmp/_trash_android /tmp/_trash_ghc \
            /tmp/_trash_jvm /tmp/_trash_swift /tmp/_trash_pwsh \
            /var/lib/docker /var/cache/snapd /home/linuxbrew \
          ) &
          mkdir -p /dev/shm/ldcache

      - name: "Setup Swap Space"
        uses: thejerrybao/setup-swap-space@v1
        with:
          swap-size-gb: 12

      - name: "Setup Build Environment"  # restore-only: clang, arsenal, ccache, lto
        id: setup-build-env
        uses: ./.github/actions/setup-build-env
        with:
          build-system:   ${{ inputs.build_system }}
          kernel-version: ${{ inputs.kernel_version }}
          ref-name:       ${{ github.ref_name }}
          root-solution:  ${{ matrix.root_solution }}
          susfs:          ${{ matrix.susfs }}
          enable-lto:     ${{ inputs.enable_lto }}
          gh-token:       ${{ secrets.PERSONAL_TOKEN }}

      - name: "Disk Usage"
        run: df -h && du -sh ~/kernel-cache/ 2>/dev/null || true

      - name: "Build"
        run: bash build.sh

      - name: "Ccache Stats"
        if: always() && startsWith(inputs.build_system, 'Make')
        run: ~/ccache-bin/ccache --show-stats

      - name: "Save Build Caches"  # LTO and ccache, both to GH Release
        if: always() && startsWith(inputs.build_system, 'Make')
        uses: ./.github/actions/save-build-caches
        with:
          build-system:   ${{ inputs.build_system }}
          enable-lto:     ${{ inputs.enable_lto }}
          lto-asset-name: lto-data-${{ inputs.kernel_version }}-${{ steps.setup-build-env.outputs.clang-variant }}-${{ matrix.root_solution }}-${{ github.ref_name }}-lto.tar.zst
          ccache-prefix:  ccache-data-${{ matrix.root_solution }}${{ matrix.susfs && '-susfs' || '' }}-${{ inputs.kernel_version }}-${{ inputs.enable_lto != 'NONE' && format('lto-{0}-', inputs.enable_lto) || '' }}${{ steps.setup-build-env.outputs.clang-variant }}-${{ github.ref_name }}-
          gh-token:       ${{ secrets.PERSONAL_TOKEN }}
