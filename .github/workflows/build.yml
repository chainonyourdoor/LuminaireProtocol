name: "✨ Luminaire Protocol"
run-name: "${{ inputs.kernel_version }} | ${{ inputs.build_system }}"
on:
  workflow_dispatch:
    inputs:
      build_system:
        description: "Build System"
        type: choice
        default: "MAKE"
        options:
          - "MAKE"
          - "KLEAF"
      kernel_version:
        description: "Kernel Version"
        type: choice
        default: "6.1"
        options:
          - "5.10"
          - "5.15"
          - "6.1"
          - "6.6"
          - "6.12"
      vanilla:
        description: "VANILLA"
        type: boolean
        default: true
      resukisu_susfs:
        description: "ReSukiSU+SuSFS"
        type: boolean
        default: false
      update_arsenal:
        description: "Update Arsenal"
        type: choice
        default: "no"
        options:
          - "yes"
          - "no"
      enable_lto:
        description: "⚠️ LTO"
        type: choice
        default: "NONE"
        options:
          - "NONE"
          - "THIN"
          - "FULL"
      bbg:
        description: "BBG (Baseband Guard)"
        type: boolean
        default: true
      droidspaces:
        description: "Droidspaces"
        type: boolean
        default: false
      nomount:
        description: "NoMount"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Luminaire:
    uses: ./.github/workflows/_kernel-build.yml
    with:
      build_system:    ${{ inputs.build_system }}
      vanilla:         ${{ inputs.vanilla }}
      resukisu_susfs:  ${{ inputs.resukisu_susfs }}
      kernel_version:  ${{ inputs.kernel_version }}
      update_arsenal:  ${{ inputs.update_arsenal }}
      enable_lto:      ${{ inputs.enable_lto }}
      addons:          "${{ inputs.bbg && 'bbg' || '' }}${{ inputs.droidspaces && ',droidspaces' || '' }}${{ inputs.nomount && ',nomount' || '' }}"
    secrets:
      PERSONAL_TOKEN:              ${{ secrets.PERSONAL_TOKEN }}
      TELEGRAM_BOT_TOKEN:          ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:            ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_THREAD_ID_ARTIFACT: ${{ secrets.TELEGRAM_THREAD_ID_ARTIFACT }}
      TELEGRAM_THREAD_ID_LOG:      ${{ secrets.TELEGRAM_THREAD_ID_LOG }}
