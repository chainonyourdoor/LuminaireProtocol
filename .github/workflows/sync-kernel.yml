name: 🌀 Sync Kernel Source

on:
  workflow_dispatch:
    inputs:
      sync_510:
        description: "Sync 5.10"
        type: boolean
        default: true
      sync_515:
        description: "Sync 5.15"
        type: boolean
        default: true
      sync_61:
        description: "Sync 6.1"
        type: boolean
        default: true
      sync_66:
        description: "Sync 6.6"
        type: boolean
        default: true
      sync_612:
        description: "Sync 6.12"
        type: boolean
        default: true
  schedule:
    - cron: '0 0 * * 0'

jobs:
  sync:
    name: "Sync ${{ matrix.version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: "5.10"
            android: "android13"
            branch: "android13-5.10-lts"
            manifest: "common-android13-5.10-lts"
            repo: "android_kernel_common-5.10"
            input: ${{ github.event_name == 'schedule' || inputs.sync_510 }}
          - version: "5.15"
            android: "android13"
            branch: "android13-5.15-lts"
            manifest: "common-android13-5.15-lts"
            repo: "android_kernel_common-5.15"
            input: ${{ github.event_name == 'schedule' || inputs.sync_515 }}
          - version: "6.1"
            android: "android14"
            branch: "android14-6.1-lts"
            manifest: "common-android14-6.1-lts"
            repo: "android_kernel_common-6.1"
            input: ${{ github.event_name == 'schedule' || inputs.sync_61 }}
          - version: "6.6"
            android: "android15"
            branch: "android15-6.6-lts"
            manifest: "common-android15-6.6-lts"
            repo: "android_kernel_common-6.6"
            input: ${{ github.event_name == 'schedule' || inputs.sync_66 }}
          - version: "6.12"
            android: "android16"
            branch: "android16-6.12-lts"
            manifest: "common-android16-6.12-lts"
            repo: "android_kernel_common-6.12"
            input: ${{ github.event_name == 'schedule' || inputs.sync_612 }}

    steps:
      - name: "Skip if not selected"
        if: ${{ !matrix.input }}
        run: echo "Skipping ${{ matrix.version }} — not selected" && exit 0

      - name: "Checkout LuminaireProtocol"
        uses: actions/checkout@v7

      - name: "Free up disk space"
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /opt/hostedtoolcache/CodeQL \
            /usr/share/swift /usr/local/.ghcup
          sudo apt-get clean
          df -h

      - name: "Install dependencies"
        run: |
          sudo apt-get install -y --no-install-recommends \
            aria2 pigz python3 git curl

      - name: "Fetch AOSP manifest"
        run: |
          mkdir -p kernel
          cd kernel
          MANIFEST_URL="https://android.googlesource.com/kernel/manifest/+/refs/heads/${{ matrix.manifest }}/default.xml?format=TEXT"
          curl -fsSL "$MANIFEST_URL" | base64 -d > manifest.xml

      - name: "Download kernel source"
        run: |
          cd kernel
          cp "$GITHUB_WORKSPACE/luminaire/download/fast_parallel_download.py" .
          python3 fast_parallel_download.py

      - name: "Get kernel version"
        id: version
        run: |
          VERSION=$(grep '^VERSION = ' kernel/common/Makefile | awk '{print $3}')
          PATCHLEVEL=$(grep '^PATCHLEVEL = ' kernel/common/Makefile | awk '{print $3}')
          SUBLEVEL=$(grep '^SUBLEVEL = ' kernel/common/Makefile | awk '{print $3}')
          echo "KERNEL_VER=${VERSION}.${PATCHLEVEL}.${SUBLEVEL}" >> $GITHUB_OUTPUT
          echo "Kernel version: ${VERSION}.${PATCHLEVEL}.${SUBLEVEL}"

      - name: "Push to repository"
        run: |
          cd kernel/common

          git config --global user.name "chainonyourdoor"
          git config --global user.email "chainonyourdoor@gmail.com"

          git init
          git checkout -b ${{ matrix.branch }}
          git add -A
          git commit -m "kernel: sync AOSP ${{ matrix.branch }} (${{ steps.version.outputs.KERNEL_VER }})"

          git remote add origin \
            https://chainonyourdoor:${{ secrets.SYNC_TOKEN }}@github.com/chainonyourdoor/${{ matrix.repo }}.git

          git push origin ${{ matrix.branch }} --force
          echo "Pushed ${{ matrix.repo }} @ ${{ steps.version.outputs.KERNEL_VER }}"
