name: Kernel Job

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      android:
        required: true
        type: string
      branch:
        required: true
        type: string
      manifest:
        required: true
        type: string
      repo:
        required: true
        type: string
    secrets:
      SYNC_TOKEN:
        required: true

jobs:
  sync:
    name: "Sync ${{ inputs.version }}"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout LuminaireProtocol"
        uses: actions/checkout@v7

      - name: "Free up disk space"
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /opt/hostedtoolcache/CodeQL \
            /usr/share/swift /usr/local/.ghcup
          sudo apt-get clean
          df -h

      - name: "Install dependencies"
        run: |
          sudo apt-get install -y --no-install-recommends \
            aria2 pigz python3 git curl

      - name: "Fetch AOSP manifest"
        run: |
          mkdir -p kernel
          cd kernel
          MANIFEST_URL="https://android.googlesource.com/kernel/manifest/+/refs/heads/${{ inputs.manifest }}/default.xml?format=TEXT"
          curl -fsSL "$MANIFEST_URL" | base64 -d > manifest.xml

      - name: "Download kernel source"
        run: |
          cd kernel
          cp "$GITHUB_WORKSPACE/luminaire/download/fast_parallel_download.py" .
          python3 fast_parallel_download.py

      - name: "Get kernel version"
        id: version
        run: |
          VERSION=$(grep '^VERSION = ' kernel/common/Makefile | awk '{print $3}')
          PATCHLEVEL=$(grep '^PATCHLEVEL = ' kernel/common/Makefile | awk '{print $3}')
          SUBLEVEL=$(grep '^SUBLEVEL = ' kernel/common/Makefile | awk '{print $3}')
          echo "KERNEL_VER=${VERSION}.${PATCHLEVEL}.${SUBLEVEL}" >> $GITHUB_OUTPUT
          echo "Kernel version: ${VERSION}.${PATCHLEVEL}.${SUBLEVEL}"

      - name: "Push to repository"
        run: |
          cd kernel/common

          git config --global user.name "chainonyourdoor"
          git config --global user.email "chainonyourdoor@gmail.com"

          git init
          git checkout -b ${{ inputs.branch }}
          git add -A
          git commit -m "kernel: sync AOSP ${{ inputs.branch }} (${{ steps.version.outputs.KERNEL_VER }})"

          git remote add origin \
            https://chainonyourdoor:${{ secrets.SYNC_TOKEN }}@github.com/chainonyourdoor/${{ inputs.repo }}.git

          git push origin ${{ inputs.branch }} --force
          echo "Pushed ${{ inputs.repo }} @ ${{ steps.version.outputs.KERNEL_VER }}"
