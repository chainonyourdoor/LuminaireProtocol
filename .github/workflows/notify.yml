name: "📡 Notify"

on:
  push:
  workflow_run:
    workflows:
      - "✨ Luminaire Protocol"
      - "🔥 Cache Warming"
      - "🌀 Sync Kernel Source"
    types:
      - requested
      - completed

jobs:

  # ======================================================
  # 📌 PUSH EVENT
  # ======================================================
  on-push:
    name: "Push"
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: "📌 Notify Push"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID_EVENT }}
          COMMIT:     ${{ github.sha }}
          BRANCH:     ${{ github.ref_name }}
          MESSAGE:    ${{ github.event.head_commit.message }}
          AUTHOR:     ${{ github.event.head_commit.author.name }}
          URL:        ${{ github.event.head_commit.url }}
        run: |
          SHORT_COMMIT="${COMMIT:0:7}"
          TITLE=$(printf '%s' "$MESSAGE" | head -1)
          BODY=$(printf '%s' "$MESSAGE" | tail -n +3)

          TEXT=$(printf '📌 New Commit : <a href="%s">%s</a>\nBranch : <code>%s</code>\nAuthor : %s\n\nTitle:\n<i>%s</i>' \
            "$URL" "$SHORT_COMMIT" "$BRANCH" "$AUTHOR" "$TITLE")

          if [ -n "$BODY" ]; then
            TEXT=$(printf '%s\n\nMessage:\n<pre>%s</pre>' "$TEXT" "$BODY")
          fi

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "message_thread_id=${TELEGRAM_THREAD_ID}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=${TEXT}" > /dev/null

  # ======================================================
  # ⚙️ WORKFLOW EVENT
  # ======================================================
  on-workflow:
    name: "Workflow"
    if: github.event_name == 'workflow_run'
    runs-on: ubuntu-latest

    steps:
      - name: "⚙️ Notify Workflow"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID_EVENT }}
          WF_NAME:    ${{ github.event.workflow_run.name }}
          WF_STATUS:  ${{ github.event.workflow_run.conclusion }}
          WF_BRANCH:  ${{ github.event.workflow_run.head_branch }}
          WF_URL:     ${{ github.event.workflow_run.html_url }}
          WF_RUN:     ${{ github.event.workflow_run.run_number }}
        run: |
          if [ "$WF_STATUS" = "success" ]; then
            ICON="✅"
            STATUS_TEXT="success"
          elif [ "$WF_STATUS" = "failure" ]; then
            ICON="❌"
            STATUS_TEXT="failure"
          elif [ "$WF_STATUS" = "cancelled" ]; then
            ICON="🚫"
            STATUS_TEXT="cancelled"
          else
            ICON="🚀"
            STATUS_TEXT="started"
          fi

          TEXT=$(printf '%s Workflow : <a href="%s">%s #%s</a>\nBranch : <code>%s</code>\nStatus : <code>%s</code>' \
            "$ICON" "$WF_URL" "$WF_NAME" "$WF_RUN" "$WF_BRANCH" "$STATUS_TEXT")

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "message_thread_id=${TELEGRAM_THREAD_ID}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=${TEXT}" > /dev/null

  # ======================================================
  # 📋 SEND LOG
  # ======================================================
  send-log:
    name: "Log"
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion != null &&
      github.event.workflow_run.name == '✨ Luminaire Protocol'
    runs-on: ubuntu-latest

    steps:
      - name: "📋 Send Log to Logbook"
        env:
          GH_TOKEN:           ${{ secrets.PERSONAL_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID_LOG }}
          RUN_ID:             ${{ github.event.workflow_run.id }}
          RUN_NUMBER:         ${{ github.event.workflow_run.run_number }}
          WF_NAME:            ${{ github.event.workflow_run.name }}
        run: |
          [ -z "${TELEGRAM_BOT_TOKEN}" ] && exit 0
          [ -z "${TELEGRAM_CHAT_ID}" ] && exit 0
          [ -z "${TELEGRAM_THREAD_ID}" ] && exit 0

          REPO="${{ github.repository }}"
          LOG_FILE="/tmp/build-log-R${RUN_NUMBER}.zip"

          gh api \
            "repos/${REPO}/actions/runs/${RUN_ID}/logs" \
            --header "Accept: application/vnd.github+json" \
            > "${LOG_FILE}" 2>/dev/null || { echo "Failed to download logs"; exit 0; }

          [ ! -s "${LOG_FILE}" ] && { echo "Log file empty"; exit 0; }

          BUILD_INFO=$(gh api \
            "repos/${REPO}/actions/runs/${RUN_ID}/artifacts" \
            --jq '.artifacts[] | select(.name == "build-info") | .id' 2>/dev/null | head -1)

          VARIANT_INFO=""
          if [ -n "$BUILD_INFO" ]; then
            gh api "repos/${REPO}/actions/artifacts/${BUILD_INFO}/zip" > /tmp/build-info.zip 2>/dev/null
            unzip -p /tmp/build-info.zip build-info.txt > /tmp/build-info.txt 2>/dev/null || true
            if [ -f /tmp/build-info.txt ]; then
              source /tmp/build-info.txt 2>/dev/null || true
              VARIANT_INFO=" — ${VARIANT} ${KERNEL_VERSION} (${BUILD_SYSTEM})"
            fi
          fi

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F "chat_id=${TELEGRAM_CHAT_ID}" \
            -F "message_thread_id=${TELEGRAM_THREAD_ID}" \
            -F "document=@${LOG_FILE};filename=$(basename ${LOG_FILE})" \
            -F "caption=Full Log — Luminaire${VARIANT_INFO} #${RUN_NUMBER}" \
            > /dev/null || true

          rm -f "${LOG_FILE}" /tmp/build-info.zip /tmp/build-info.txt
