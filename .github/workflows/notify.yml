name: "📡 Notify"

on:
  push:

jobs:

  # ======================================================
  # 📌 PUSH EVENT
  # ======================================================
  on-push:
    name: "Push"
    runs-on: ubuntu-latest

    steps:
      - name: "📌 Notify Push"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID_EVENT }}
          COMMIT:     ${{ github.sha }}
          BRANCH:     ${{ github.ref_name }}
          MESSAGE:    ${{ github.event.head_commit.message }}
          AUTHOR:     ${{ github.event.head_commit.author.name }}
          URL:        ${{ github.event.head_commit.url }}
        run: |
          SHORT_COMMIT="${COMMIT:0:7}"
          TITLE=$(printf '%s' "$MESSAGE" | head -1)
          BODY=$(printf '%s' "$MESSAGE" | tail -n +3)

          TEXT=$(printf '📌 New Commit : <a href="%s">%s</a>\nBranch : <code>%s</code>\nAuthor : %s\n\nTitle:\n<i>%s</i>' \
            "$URL" "$SHORT_COMMIT" "$BRANCH" "$AUTHOR" "$TITLE")

          if [ -n "$BODY" ]; then
            TEXT=$(printf '%s\n\nMessage:\n<pre>%s</pre>' "$TEXT" "$BODY")
          fi

          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "message_thread_id=${TELEGRAM_THREAD_ID}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=${TEXT}")
          echo "$RESPONSE" | grep -q '"ok":true' \
            && echo "Notify sent ✅" \
            || echo "⚠️ Notify failed: $RESPONSE"
